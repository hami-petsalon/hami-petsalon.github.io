  <script>
    (function () {
      if (!("serviceWorker" in navigator)) return;

      // 每次你上版可以改這個字串，強制檢查最新版
      const SW_VERSION = "1";
      const SW_URL = `./sw.js?v=${SW_VERSION}`;

      let isRefreshing = false;

      function forceActivate(registration) {
        if (registration && registration.waiting) {
          registration.waiting.postMessage({ type: "SKIP_WAITING" });
        }
      }

      function listenForWaitingServiceWorker(registration) {
        if (!registration) return;

        // 已有 waiting worker（代表有新版本）
        if (registration.waiting) {
          forceActivate(registration);
          return;
        }

        // 監聽更新流程
        registration.addEventListener("updatefound", () => {
          const newWorker = registration.installing;
          if (!newWorker) return;

          newWorker.addEventListener("statechange", () => {
            // installed + 有 controller => 代表是更新不是首次安裝
            if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
              forceActivate(registration);
            }
          });
        });
      }

      // 一旦新 SW 接管頁面就自動刷新
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (isRefreshing) return;
        isRefreshing = true;
        window.location.reload();
      });

      window.addEventListener("load", async () => {
        try {
          const registration = await navigator.serviceWorker.register(SW_URL);
          listenForWaitingServiceWorker(registration);

          // 定期檢查更新（60 秒）
          setInterval(() => {
            registration.update();
          }, 60000);

          // 回到頁面時也檢查一次
          document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
              registration.update();
            }
          });

          // 網路恢復時檢查更新
          window.addEventListener("online", () => {
            registration.update();
          });
        } catch (err) {
          console.error("Service Worker 註冊失敗：", err);
        }
      });
    })();
  </script>

  <script type="text/babel">
    const { useMemo, useRef, useState, useEffect } = React;

const SERVICE_CARD_LIST = [

];

const SERVICE_MINI_LIST = [

];

    function getSavedRecords() {
      return JSON.parse(localStorage.getItem("hami_records") || "[]");
    }

    function saveRecord(record) {
      const rows = getSavedRecords();
      rows.unshift({ ...record, created_at: new Date().toISOString() });
      localStorage.setItem("hami_records", JSON.stringify(rows));
    }

    function formatSignTime(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${y}/${m}/${day} ${hh}:${mm}`;
    }

    function App() {
      const [step, setStep] = useState("form");
      const [toast, setToast] = useState("");
      const [errors, setErrors] = useState({});

      const [owner, setOwner] = useState({
        owner_name: "",
        owner_phone: "",
        owner_email: "",
        owner_id: "",
        owner_address: "",
        emergency_name: "",
        emergency_phone: "",
        preferred_hospital: ""
      });

      const [pets, setPets] = useState([createEmptyPet()]);
      const [currentPetIndex, setCurrentPetIndex] = useState(0);

      const [agreeTerms, setAgreeTerms] = useState(false);
      const [termsOpen, setTermsOpen] = useState(false);

      const [historyOpen, setHistoryOpen] = useState(false);
      const [foundHistory, setFoundHistory] = useState([]);
      const [selectedHistoryIdx, setSelectedHistoryIdx] = useState([]);

      const [sigModalOpen, setSigModalOpen] = useState(false);
      const [signatureData, setSignatureData] = useState("");
      const [signTime, setSignTime] = useState("--");

      const [lastPayload, setLastPayload] = useState(null);

      const canvasRef = useRef(null);
      const ctxRef = useRef(null);
      const drawingRef = useRef(false);
      const hasSignRef = useRef(false);

      const p = useMemo(() => pets[currentPetIndex], [pets, currentPetIndex]);

      useEffect(() => {
        if (!toast) return;
        const t = setTimeout(() => setToast(""), 3000);
        return () => clearTimeout(t);
      }, [toast]);

      useEffect(() => {
        if (!sigModalOpen) return;

        const canvas = canvasRef.current;
        const ratio = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();

        canvas.width = Math.max(1, rect.width * ratio);
        canvas.height = Math.max(1, rect.height * ratio);

        const ctx = canvas.getContext("2d");
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(ratio, ratio);
        ctx.lineWidth = 2.6;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#4A3426";
        ctx.fillStyle = "#FFF9F2";
        ctx.fillRect(0, 0, rect.width, rect.height);

        ctxRef.current = ctx;
        drawingRef.current = false;
        hasSignRef.current = false;

        const getPos = (e) => {
          const r = canvas.getBoundingClientRect();
          return { x: e.clientX - r.left, y: e.clientY - r.top };
        };

        const onDown = (e) => {
          e.preventDefault();
          drawingRef.current = true;
          hasSignRef.current = true;
          const pos = getPos(e);
          ctx.beginPath();
          ctx.moveTo(pos.x, pos.y);
        };
        const onMove = (e) => {
          if (!drawingRef.current) return;
          e.preventDefault();
          const pos = getPos(e);
          ctx.lineTo(pos.x, pos.y);
          ctx.stroke();
        };
        const onUp = () => {
          drawingRef.current = false;
        };

        canvas.addEventListener("pointerdown", onDown);
        canvas.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp);

        return () => {
          canvas.removeEventListener("pointerdown", onDown);
          canvas.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
        };
      }, [sigModalOpen]);

      const patchCurrentPet = (patch) => {
        setPets((prev) => {
          const next = [...prev];
          next[currentPetIndex] = { ...next[currentPetIndex], ...patch };
          return next;
        });
      };

      const toggleService = (serviceName) => {
        const list = p.services || [];
        let next;
        if (list.includes(serviceName)) {
          next = list.filter((x) => x !== serviceName);
        } else {
          next = [...list, serviceName];
        }
        patchCurrentPet({ services: next });
      };

      const addPet = () => {
        setPets((prev) => {
          const next = [...prev, createEmptyPet()];
          setCurrentPetIndex(next.length - 1);
          return next;
        });
      };

      const delPet = (idx) => {
        if (pets.length === 1) return;
        const next = pets.filter((_, i) => i !== idx);
        setPets(next);
        setCurrentPetIndex(Math.max(0, Math.min(currentPetIndex, next.length - 1)));
      };

      const openSignatureModal = () => setSigModalOpen(true);
      const closeSignatureModal = () => setSigModalOpen(false);

      const clearFullSignaturePad = () => {
        const canvas = canvasRef.current;
        const ctx = ctxRef.current;
        if (!canvas || !ctx) return;
        const rect = canvas.getBoundingClientRect();
        ctx.fillStyle = "#FFF9F2";
        ctx.fillRect(0, 0, rect.width, rect.height);
        hasSignRef.current = false;
      };

      const confirmSignature = () => {
        if (!hasSignRef.current) {
          alert("請先簽名再確認");
          return;
        }
        const data = canvasRef.current.toDataURL("image/png");
        setSignatureData(data);
        setSignTime(formatSignTime(new Date()));
        setSigModalOpen(false);
      };

      const clearSignature = () => {
        setSignatureData("");
        setSignTime("--");
        hasSignRef.current = false;
      };

      const onSearchHistory = () => {
        const phone = owner.owner_phone.trim();
        if (!/^09\d{8}$/.test(phone)) {
          alert("請先輸入正確手機格式：09xxxxxxxx");
          return;
        }
        const all = getSavedRecords();
        const found = all.filter((r) => (r.owner?.owner_phone || "") === phone);
        if (!found.length) {
          alert("查無舊客資料");
          return;
        }
        setFoundHistory(found);
        setSelectedHistoryIdx([]);
        setHistoryOpen(true);
      };

      const applyOwnerOnly = () => {
        if (!foundHistory.length) return;
        const o = foundHistory[0].owner || {};
setOwner({
  owner_name: o.owner_name || "",
  owner_phone: o.owner_phone || "",
  owner_email: o.owner_email || "",
  owner_id: o.owner_id || "",
  owner_address: o.owner_address || "",
  emergency_name: o.emergency_name || "",
  emergency_phone: o.emergency_phone || "",
  preferred_hospital: o.preferred_hospital || ""
});
        setHistoryOpen(false);
        setToast("已帶入飼主資料");
      };

      const applySelectedPets = () => {
        if (!selectedHistoryIdx.length) {
          alert("請至少勾選一筆");
          return;
        }
        const base = foundHistory[selectedHistoryIdx[0]];
        const o = base.owner || {};
setOwner({
  owner_name: o.owner_name || "",
  owner_phone: o.owner_phone || "",
  owner_email: o.owner_email || "",
  owner_id: o.owner_id || "",
  owner_address: o.owner_address || "",
  emergency_name: o.emergency_name || "",
  emergency_phone: o.emergency_phone || "",
  preferred_hospital: o.preferred_hospital || ""
});

        const mergedPets = [];
        selectedHistoryIdx.forEach((i) => {
          (foundHistory[i].pets || []).forEach((pet) => {
            mergedPets.push({ ...createEmptyPet(), ...pet });
          });
        });

        setPets(mergedPets.length ? mergedPets : [createEmptyPet()]);
        setCurrentPetIndex(0);
        setHistoryOpen(false);
        setToast("已帶入舊客資料");
      };

      const validate = () => {
        const e = {};
const ownerEmail = owner.owner_email.trim();
const emailOk = /^\S+@\S+\.\S+$/.test(ownerEmail);

if (!owner.owner_name.trim()) e.owner_name = "請輸入飼主姓名";
if (ownerEmail && !emailOk) e.owner_email = "電子信箱格式不正確（若無可留空）";
        if (!/^09\d{8}$/.test(owner.owner_phone.trim())) e.owner_phone = "請輸入有效手機號碼";
        if (!/^[A-Z][12]\d{8}$/.test(owner.owner_id.trim().toUpperCase())) e.owner_id = "請輸入有效身分證字號";
        if (!owner.owner_address.trim()) e.owner_address = "請輸入通訊地址";
        if (!owner.emergency_name.trim()) e.emergency_name = "請輸入緊急聯絡人";
        if (!/^09\d{8}$/.test(owner.emergency_phone.trim())) e.emergency_phone = "請輸入有效緊急電話";

        pets.forEach((x, idx) => {
          const key = `pet_${idx}`;
          if (!x.pet_name.trim()) e[`${key}_pet_name`] = `第 ${idx + 1} 隻：請填寫寵物名字`;
          if (!x.pet_type) e[`${key}_pet_type`] = `第 ${idx + 1} 隻：請選擇寵物種類`;
          if (!x.pet_breed.trim()) e[`${key}_pet_breed`] = `第 ${idx + 1} 隻：請填寫品種`;
          if (x.pet_age === "" || Number(x.pet_age) < 0) e[`${key}_pet_age`] = `第 ${idx + 1} 隻：請填寫年齡`;

          if (!x.pet_chip_status) e[`${key}_chip_status`] = `第 ${idx + 1} 隻：請選擇晶片狀態`;
          if (x.pet_chip_status === "has") {
            if (!/^(\d{10}|\d{15})$/.test((x.pet_chip_no || "").trim())) {
              e[`${key}_chip_no`] = `第 ${idx + 1} 隻：晶片號碼需 10 或 15 碼數字`;
            }
          }

          if (!x.pet_sex) e[`${key}_pet_sex`] = `第 ${idx + 1} 隻：請選擇性別`;
          if (!x.pet_neuter) e[`${key}_pet_neuter`] = `第 ${idx + 1} 隻：請選擇是否結紮`;
          if (!x.pet_friendly_human) e[`${key}_pet_friendly_human`] = `第 ${idx + 1} 隻：請選擇是否親人`;
          if (!x.pet_friendly_dog) e[`${key}_pet_friendly_dog`] = `第 ${idx + 1} 隻：請選擇是否親狗`;
          if (!x.pet_aggressive) e[`${key}_pet_aggressive`] = `第 ${idx + 1} 隻：請選擇是否具攻擊性`;
          if (!x.pet_medical_history) e[`${key}_pet_medical_history`] = `第 ${idx + 1} 隻：請選擇是否有病史`;
          if (x.pet_medical_history === "有" && !x.pet_medical_note.trim()) {
            e[`${key}_pet_medical_note`] = `第 ${idx + 1} 隻：請填寫病史描述`;
          }

          if (!x.services || !x.services.length) e[`${key}_services`] = `第 ${idx + 1} 隻：至少勾選一項服務`;
          if ((x.services || []).includes("其他項目") && !x.service_type_other.trim()) {
            e[`${key}_service_type_other`] = `第 ${idx + 1} 隻：請填寫其他項目`;
          }

          if (x.pickup_mode === "time" && !x.pickup_time) e[`${key}_pickup_time`] = `第 ${idx + 1} 隻：請填寫接回時間`;
          if (!x.payment) e[`${key}_payment`] = `第 ${idx + 1} 隻：請選擇支付方式`;
          if (x.payment === "其他" && !x.payment_other.trim()) e[`${key}_payment_other`] = `第 ${idx + 1} 隻：請填寫其他支付方式`;
          if (x.service_amount === "" || Number(x.service_amount) < 0) e[`${key}_service_amount`] = `第 ${idx + 1} 隻：請填正確金額`;
        });

        if (!agreeTerms) e.agreeTerms = "請勾選同意條款";
        if (!signatureData) e.signatureData = "請完成簽名";

        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const buildPayload = () => {
        return {
          owner: {
            ...owner,
            owner_id: owner.owner_id.trim().toUpperCase(),
owner_email: owner.owner_email.trim()
          },
          pets,
          sign_time: signTime,
          signature: signatureData
        };
      };

              <p className="text-xs text-hami-muted font-bold">點擊下方簽名區塊可開啟全螢幕簽名板</p>

              <div className={`signature-box ${errors.signatureData ? "ring-2 ring-red-400" : ""}`} onClick={openSignatureModal}>
                {!signatureData
                  ? <div className="signature-empty">點擊此處開始簽名</div>
                  : <img src={signatureData} className="signature-preview-img" alt="簽名預覽" />
                }
              </div>
              {errors.signatureData && <div className="error-text">{errors.signatureData}</div>}

              <div className="flex flex-wrap items-center gap-2">
                <button className="btn-ghost" type="button" onClick={clearSignature}>重新簽名</button>
                <span className="text-xs font-bold text-hami-muted">簽署時間：{signTime}</span>
              </div>

              <button className="btn-primary w-full py-3 text-sm" type="button" onClick={onSubmit}>
                確認送出
              </button>
            </section>
          </main>

          {termsOpen && (
            <div className="fixed inset-0 z-[60] bg-black/45 p-4" onClick={()=>setTermsOpen(false)}>
              <div className="max-w-2xl mx-auto mt-6 modal-panel bg-white flex flex-col max-h-[88vh]" onClick={(e)=>e.stopPropagation()}>
                <div className="bg-gradient-to-r from-[#F6EBC6] to-[#E8D7A5] text-[#5D4D41] px-4 py-3 font-black text-sm flex items-center justify-between">
                  <div>寵物美容定型化契約條款</div>
                  <button className="text-xs font-black px-2 py-1 rounded hover:bg-white/40" onClick={()=>setTermsOpen(false)}>關閉</button>
                </div>

<div className="p-4 space-y-3 overflow-y-auto text-sm leading-7 text-[#5D4D41]">
  <p className="font-bold text-base">條款內容待確認</p>
  <p>目前此區塊先保留，待與貴店確認正式「寵物美容定型化契約條款」版本後補上。</p>
  <div className="rounded-xl border border-hami-line bg-[#FFFBF2] p-3 text-xs">
    顯示狀態：<b>待確認</b><br/>
    ※ 為避免條文版本錯置，暫不顯示正式法律內容。
  </div>
</div>

                <div className="p-4 border-t border-hami-line flex gap-2">
                  <button className="btn-primary flex-1 justify-center" onClick={()=>{setAgreeTerms(true);setTermsOpen(false);}}>
                    我已閱讀並同意
                  </button>
                </div>
              </div>
            </div>
          )}

          {historyOpen && (
            <div className="fixed inset-0 z-50 bg-black/45 p-4" onClick={()=>setHistoryOpen(false)}>
              <div className="max-w-md mx-auto mt-16 modal-panel" onClick={(e)=>e.stopPropagation()}>
                <div className="bg-gradient-to-r from-[#F6EBC6] to-[#E8D7A5] text-[#5D4D41] px-4 py-3 font-black text-sm">找到舊客資料</div>
                <div className="p-4 space-y-2 max-h-[55vh] overflow-auto">
                  {foundHistory.map((r,idx)=>(
                    <label key={idx} className="rounded-xl border border-hami-line bg-[#FFFBF6] p-3 flex items-start gap-2 cursor-pointer">
                      <input
                        type="checkbox"
                        checked={selectedHistoryIdx.includes(idx)}
                        onChange={(e)=>{
                          if(e.target.checked) setSelectedHistoryIdx(prev=>[...prev, idx]);
                          else setSelectedHistoryIdx(prev=>prev.filter(x=>x!==idx));
                        }}
                      />
                      <div>
                        <p className="font-black text-sm">{(r.owner?.owner_name||"")}｜{(r.owner?.owner_phone||"")}</p>
                        <p className="text-xs text-hami-muted">
                          毛孩：{(r.pets||[]).map(x=>x.pet_name).join("、") || "無"}
                        </p>
                        <p className="text-[11px] text-hami-muted">
                          日期：{(r.created_at||"").replace("T"," ").slice(0,16)}
                        </p>
                      </div>
                    </label>
                  ))}
                </div>
                <div className="p-4 border-t border-hami-line flex gap-2">
                  <button className="flex-1 btn-secondary py-2 text-sm justify-center" onClick={applyOwnerOnly}>只帶入飼主</button>
                  <button className="flex-1 btn-primary py-2 text-sm justify-center" onClick={applySelectedPets}>帶入勾選毛孩</button>
                </div>
              </div>
            </div>
          )}

          {sigModalOpen && (
            <div id="signatureModal">
              <div className="sig-top">
                <div className="font-black text-sm text-[#5D4D41]">全螢幕簽名板</div>
                <button type="button" className="text-xs font-black px-3 py-1 rounded bg-white/70 text-[#5D4D41]" onClick={closeSignatureModal}>關閉</button>
              </div>
              <div className="sig-stage">
                <canvas id="signatureCanvasFull" ref={canvasRef}></canvas>
              </div>
              <div className="sig-actions">
                <button type="button" className="btn-ghost flex-1 justify-center" onClick={clearFullSignaturePad}>清空</button>
                <button type="button" className="btn-primary flex-1 justify-center" onClick={confirmSignature}>確認簽名</button>
              </div>
            </div>
          )}
        </>
      );
    }

    function generateContractHTML(payload) {
      const owner = payload.owner || {};
      const pets = payload.pets || [];

      const mapChip = (status, no) => {
        if (status === "has") return `有 (${no || "未填"})`;
        if (status === "unknown") return "有（號碼不詳）";
        return "無";
      };

      const renderPet = (p, i) => {
        const services = (p.services || []).join("、") + ((p.services || []).includes("其他項目") ? `（${p.service_type_other || "未填"}）` : "");
        const pickup = p.pickup_mode === "notify" ? "另行通知美容完成接回時間" : (p.pickup_time || "未填");
        const payment = p.payment === "其他" ? `其他（${p.payment_other || "未填"}）` : (p.payment || "未填");

        return `
          <div style="border:1px solid #eee;border-radius:10px;padding:14px;margin:14px 0;">
            <h3 style="margin:0 0 10px 0;color:#5D4D41;">毛孩 ${i + 1}：${p.pet_name || "未填"}</h3>
            <table width="100%" cellpadding="6" cellspacing="0" style="font-size:13px;border-collapse:collapse;">
              <tr><td style="width:28%;color:#888;border-bottom:1px solid #f0f0f0;">種類/品種</td><td style="border-bottom:1px solid #f0f0f0;">${p.pet_type || "-"} / ${p.pet_breed || "-"}</td></tr>
              <tr><td style="color:#888;border-bottom:1px solid #f0f0f0;">花色/年齡</td><td style="border-bottom:1px solid #f0f0f0;">${p.pet_color || "-"} / ${p.pet_age || "-"} 歲</td></tr>
              <tr><td style="color:#888;border-bottom:1px solid #f0f0f0;">晶片</td><td style="border-bottom:1px solid #f0f0f0;">${mapChip(p.pet_chip_status, p.pet_chip_no)}</td></tr>
              <tr><td style="color:#888;border-bottom:1px solid #f0f0f0;">性別/結紮</td><td style="border-bottom:1px solid #f0f0f0;">${p.pet_sex || "-"} / ${p.pet_neuter || "-"}</td></tr>
              <tr><td style="color:#888;border-bottom:1px solid #f0f0f0;">親人/親狗/攻擊性</td><td style="border-bottom:1px solid #f0f0f0;">${p.pet_friendly_human || "-"} / ${p.pet_friendly_dog || "-"} / ${p.pet_aggressive || "-"}</td></tr>
              <tr><td style="color:#888;border-bottom:1px solid #f0f0f0;">病史/敏感部位</td><td style="border-bottom:1px solid #f0f0f0;">${p.pet_medical_history || "-"} ${p.pet_medical_note ? `(${p.pet_medical_note})` : ""} / ${p.pet_dislike_touch || "無"}</td></tr>
              <tr><td style="color:#888;border-bottom:1px solid #f0f0f0;">服務項目</td><td style="border-bottom:1px solid #f0f0f0;">${services || "-"}</td></tr>
              <tr><td style="color:#888;border-bottom:1px solid #f0f0f0;">接回時間</td><td style="border-bottom:1px solid #f0f0f0;">${pickup}</td></tr>
              <tr><td style="color:#888;border-bottom:1px solid #f0f0f0;">支付方式</td><td style="border-bottom:1px solid #f0f0f0;">${payment}</td></tr>
              <tr><td style="color:#888;">金額</td><td>NT$ ${p.service_amount || 0}</td></tr>
            </table>
          </div>
        `;
      };

      return `
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hami 契約副本</title>
</head>
<body style="margin:0;padding:20px;background:#FFFDF8;color:#5D4D41;font-family:Arial,'Noto Sans TC',sans-serif;">
  <div style="max-width:760px;margin:0 auto;background:#fff;border:1px solid #eee;border-radius:12px;overflow:hidden;">
    <div style="background:#5D4D41;color:#fff;padding:18px 20px;">
      <h1 style="margin:0;font-size:22px;">Hami 寵物美容｜契約副本</h1>
      <p style="margin:6px 0 0 0;font-size:12px;color:#F6EBC6;">Pet Grooming Contract Copy</p>
    </div>

    <div style="padding:20px;">
      <h2 style="margin:0 0 10px 0;font-size:18px;">飼主資料</h2>
      <table width="100%" cellpadding="6" cellspacing="0" style="font-size:13px;border-collapse:collapse;margin-bottom:12px;">
        <tr><td style="width:24%;color:#888;border-bottom:1px solid #f0f0f0;">姓名</td><td style="border-bottom:1px solid #f0f0f0;">${owner.owner_name || "-"}</td></tr>
        <tr><td style="color:#888;border-bottom:1px solid #f0f0f0;">手機</td><td style="border-bottom:1px solid #f0f0f0;">${owner.owner_phone || "-"}</td></tr>
<tr><td style="color:#888;border-bottom:1px solid #f0f0f0;">信箱</td><td style="border-bottom:1px solid #f0f0f0;">${owner.owner_email || "未提供"}</td></tr>
        <tr><td style="color:#888;border-bottom:1px solid #f0f0f0;">身分證</td><td style="border-bottom:1px solid #f0f0f0;">${owner.owner_id || "-"}</td></tr>
        <tr><td style="color:#888;border-bottom:1px solid #f0f0f0;">地址</td><td style="border-bottom:1px solid #f0f0f0;">${owner.owner_address || "-"}</td></tr>
        <tr><td style="color:#888;border-bottom:1px solid #f0f0f0;">緊急聯絡</td><td style="border-bottom:1px solid #f0f0f0;">${owner.emergency_name || "-"} / ${owner.emergency_phone || "-"}</td></tr>
        <tr><td style="color:#888;">指定醫院</td><td>${owner.preferred_hospital || "無（依店家指定）"}</td></tr>
      </table>

      <h2 style="margin:14px 0 8px 0;font-size:18px;">毛孩服務內容</h2>
      ${pets.map((pet, i) => renderPet(pet, i)).join("")}

      <h2 style="margin:16px 0 8px 0;font-size:18px;">簽署</h2>
      <div style="border:1px dashed #ddd;padding:12px;border-radius:10px;text-align:center;">
        <div style="font-size:12px;color:#888;margin-bottom:8px;">飼主電子簽名</div>
        <img src="${payload.signature || ""}" style="max-height:90px;max-width:100%;object-fit:contain;" />
        <div style="font-size:12px;color:#888;margin-top:8px;">簽署時間：${payload.sign_time || "-"}</div>
      </div>

      <div style="margin-top:20px;font-size:12px;color:#888;line-height:1.7;">
        本副本為系統輸出，建議飼主截圖或列印留存。若有疑義，請以門市說明及現場確認內容為準。
      </div>
    </div>
  </div>
</body>
</html>
      `;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
