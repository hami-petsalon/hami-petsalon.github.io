<script>
  (function () {
    if (!("serviceWorker" in navigator)) return;

    const SW_URL_FIXED = "./sw.js?v=5";

    const APP_VERSION =
      new URL(SW_URL_FIXED, window.location.href).searchParams.get("v") || "0";

    let isRefreshing = false;

    const verKey = "__hami_app_version__";
    const savedVer = localStorage.getItem(verKey);
    if (savedVer !== APP_VERSION) {
      localStorage.setItem(verKey, APP_VERSION);
      const u = new URL(window.location.href);
      u.searchParams.set("v", APP_VERSION);
      if (u.href !== window.location.href) {
        window.location.replace(u.href);
        return;
      }
    }

    function forceActivate(registration) {
      if (registration && registration.waiting) {
        registration.waiting.postMessage({ type: "SKIP_WAITING" });
      }
    }

    function listenForWaitingServiceWorker(registration) {
      if (!registration) return;

      if (registration.waiting) {
        forceActivate(registration);
        return;
      }

      registration.addEventListener("updatefound", () => {
        const newWorker = registration.installing;
        if (!newWorker) return;

        newWorker.addEventListener("statechange", () => {
          if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
            forceActivate(registration);
          }
        });
      });
    }

    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (isRefreshing) return;
      isRefreshing = true;
      window.location.reload();
    });

    window.addEventListener("load", async () => {
      try {
        const registration = await navigator.serviceWorker.register(SW_URL_FIXED, {
          updateViaCache: "none"
        });

        listenForWaitingServiceWorker(registration);

        registration.update();

        setInterval(() => {
          registration.update();
        }, 30000);

        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "visible") registration.update();
        });

        window.addEventListener("online", () => {
          registration.update();
        });
      } catch (err) {
        console.error("Service Worker 註冊失敗：", err);
      }
    });
  })();
</script>

// dataURL -> Blob
function dataURLtoBlob(dataURL) {
  const arr = dataURL.split(",");
  const mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);
  while (n--) u8arr[n] = bstr.charCodeAt(n);
  return new Blob([u8arr], { type: mime });
}

// 簽名壓縮（webp 小很多）
async function compressSignatureDataUrl(signatureDataUrl, options = {}) {
  const {
    maxWidth = 900,
    maxHeight = 450,
    mimeType = "image/webp",
    quality = 0.85,
    background = "#FFFFFF"
  } = options;

  const originalBlob = dataURLtoBlob(signatureDataUrl);
  const bitmap = await createImageBitmap(originalBlob);

  const scale = Math.min(1, maxWidth / bitmap.width, maxHeight / bitmap.height);
  const targetW = Math.max(1, Math.round(bitmap.width * scale));
  const targetH = Math.max(1, Math.round(bitmap.height * scale));

  const canvas = document.createElement("canvas");
  canvas.width = targetW;
  canvas.height = targetH;

  const ctx = canvas.getContext("2d");
  ctx.fillStyle = background;
  ctx.fillRect(0, 0, targetW, targetH);
  ctx.drawImage(bitmap, 0, 0, targetW, targetH);

  const compressedBlob = await new Promise((resolve) => {
    canvas.toBlob((b) => resolve(b), mimeType, quality);
  });

  if (!compressedBlob) {
    const fallbackBlob = await new Promise((resolve) => {
      canvas.toBlob((b) => resolve(b), "image/png");
    });
    return { blob: fallbackBlob, contentType: "image/png", ext: "png" };
  }

  const ext =
    mimeType.includes("webp") ? "webp" :
    (mimeType.includes("jpeg") || mimeType.includes("jpg")) ? "jpg" : "png";

  return { blob: compressedBlob, contentType: mimeType, ext };
}

function normalizePhone(input) {
  return String(input || "").replace(/[^\d]/g, "").trim();
}

async function uploadSignatureAndGetUrl(signatureDataUrl, phone) {
  if (!signatureDataUrl) throw new Error("缺少簽名");

  const compressed = await compressSignatureDataUrl(signatureDataUrl, {
    maxWidth: 900,
    maxHeight: 450,
    mimeType: "image/webp",
    quality: 0.85,
    background: "#FFFFFF"
  });

  const safePhone = normalizePhone(phone || "unknown");
  const filePath = `hami/${safePhone}/${Date.now()}_${Math.random().toString(36).slice(2)}.${compressed.ext}`;

  const { data, error } = await sb.storage
    .from("signatures")
    .upload(filePath, compressed.blob, {
      contentType: compressed.contentType,
      upsert: false
    });

  if (error) throw error;

  const { data: pub } = sb.storage.from("signatures").getPublicUrl(data.path);
  return pub.publicUrl;
}

        const rect = canvas.getBoundingClientRect();

        canvas.width = Math.max(1, rect.width * ratio);
        canvas.height = Math.max(1, rect.height * ratio);

        const ctx = canvas.getContext("2d");
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(ratio, ratio);
        ctx.lineWidth = 2.6;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#4A3426";
        ctx.fillStyle = "#FFF9F2";
        ctx.fillRect(0, 0, rect.width, rect.height);

        ctxRef.current = ctx;
        drawingRef.current = false;
        hasSignRef.current = false;

        const getPos = (e) => {
          const r = canvas.getBoundingClientRect();
          return { x: e.clientX - r.left, y: e.clientY - r.top };
        };

        const onDown = (e) => {
          e.preventDefault();
          drawingRef.current = true;
          hasSignRef.current = true;
          const pos = getPos(e);
          ctx.beginPath();
          ctx.moveTo(pos.x, pos.y);
        };
        const onMove = (e) => {
          if (!drawingRef.current) return;
          e.preventDefault();
          const pos = getPos(e);
          ctx.lineTo(pos.x, pos.y);
          ctx.stroke();
        };
        const onUp = () => {
          drawingRef.current = false;
        };

        canvas.addEventListener("pointerdown", onDown);
        canvas.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp);

        return () => {
          canvas.removeEventListener("pointerdown", onDown);
          canvas.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
        };
      }, [sigModalOpen]);

const buildErrorAlertText = (eObj) => {
  const petBucket = new Map(); // idx -> { petName, fields:Set<string> }
  const otherMsgs = [];

  Object.entries(eObj || {}).forEach(([k, msg]) => {
    const m = k.match(/^pet_(\d+)_(.+)$/);
    if (m) {
      const idx = Number(m[1]);
      const suffix = m[2];

      const petName =
        (pets?.[idx]?.pet_name || "").toString().trim() || `寵物 ${idx + 1}`;

      if (!petBucket.has(idx)) petBucket.set(idx, { petName, fields: new Set() });
      petBucket.get(idx).fields.add(keyToFieldLabel(suffix));
    } else {
      otherMsgs.push(msg);
    }
  });

  const lines = ["請補齊以下欄位："];

  // 非寵物類（飼主、支付方式、條款、簽名...）
  otherMsgs.forEach((m) => lines.push(`- ${m}`));

  // 寵物類（彙整顯示）
  [...petBucket.entries()]
    .sort((a, b) => a[0] - b[0])
    .forEach(([idx, info]) => {
      lines.push(`- 第 ${idx + 1} 隻（${info.petName}）：${[...info.fields].join("、")}`);
    });

  return lines.join("\n");

else if (!agreeTerms) e.agreeTerms = "請先詳閱並同意條款";
if (!signatureData) e.signatureData = "請完成簽名";

  setErrors(e);
  const ok = Object.keys(e).length === 0;
  return { ok, errors: e };
};

const buildPayload = () => {
  return {
    owner: {
      ...owner,
      owner_id: owner.owner_id.trim().toUpperCase(),
      owner_email: owner.owner_email.trim()
    },
    pets: (Array.isArray(pets) ? pets : []).map((pt) => ({
      ...pt,
      payment: globalPayment || "",
      payment_other: globalPayment === "其他" ? (globalPaymentOther || "") : ""
    })),
    sign_time: signTime,
    signature: signatureData
  };
};

const onSubmit = async () => {
  if (submitBusy) return; // ✅ 防止連點

const { ok, errors: eObj } = validate();
if (!ok) {
  alert(buildErrorAlertText(eObj));
  focusFirstError(eObj);
  return;
}
  setSubmitBusy(true);

  try {
    // 1) 組 payload（不要把 base64 簽名塞進 DB）
    const payload = buildPayload();

    // 2) 上傳簽名到 Storage，拿 URL
    const phone = normalizePhone(payload?.owner?.owner_phone || "");
    const signatureUrl = await uploadSignatureAndGetUrl(signatureData, phone);

    // 3) 寫入 Supabase（RPC 插入）
    const payloadToDb = {
      ...payload,
      signature: "",                 // 不存 base64
      signature_url: signatureUrl,   // 存 URL
      signature_signed_at: new Date().toISOString()
    };

    const { data: agreementId, error } = await sb.rpc("submit_hami_grooming_agreement", {
      p_payload: payloadToDb,
      p_signature_url: signatureUrl
    });
    if (error) throw error;

    // 4) Success view 要用的 lastPayload（含 signature_url）
    setLastPayload({
      ...payloadToDb,
      agreement_id: agreementId || ""
    });

    // 5) 寄 Email（有填 email → 寄客人 + BCC 店家；沒填 → 只寄店家）
    const html = generateContractHTML({
      ...payloadToDb,
      signature: signatureUrl
    });

    const petNamesForSubject =
      (Array.isArray(payloadToDb?.pets) ? payloadToDb.pets : [])
        .map(x => (x?.pet_name || "").toString().trim())
        .filter(Boolean)
        .join("、") || "毛孩";

    try {
      await sendContractEmailHami({
        toEmail: payloadToDb?.owner?.owner_email || "",
        html,
        petNames: petNamesForSubject
      });
    } catch (e) {
      console.error(e);
      alert("⚠️ 已成功送出，但 Email 寄送失敗。請點『開啟完整契約』後截圖保存。");
    }

    setStep("done");
  } catch (err) {
    console.error(err);
    alert("❌ 送出失敗：" + (err?.message || "請稍後再試"));
  } finally {
    setSubmitBusy(false);
  }
};

    const d = new Date(s);
    if (!Number.isFinite(d.getTime())) return "";
    // 契約副本用 zh-TW 顯示（24 小時）
    return d.toLocaleString("zh-TW", { hour12: false });
  };

  const mapChip = (status, no) => {
    if (status === "has") return `有（${safe(no, "未填")}）`;
    if (status === "unknown") return "有（號碼不詳）";
    return "無";
  };

  const renderKVTable = (rows) => {
    return `
      <table width="100%" cellpadding="8" cellspacing="0" style="border-collapse:collapse;font-size:13px;">
        ${rows
          .map(
            ([k, v]) => `
          <tr>
            <td style="width:28%;color:#8D7E73;border-bottom:1px solid #F0F0F0;background:#FFFCF6;font-weight:700;">${e(k)}</td>
            <td style="border-bottom:1px solid #F0F0F0;color:#5D4D41;font-weight:700;">${v}</td>
          </tr>
        `
          )
          .join("")}
      </table>
    `;
  };

  const renderPet = (p, i) => {
    const services = Array.isArray(p.services) ? p.services : [];
    const servicesText = services.filter(Boolean).join("、");
    const serviceFinal = services.includes("其他項目")
      ? `${safe(servicesText, "未填")}（${safe(p.service_type_other, "未填")}）`
      : safe(servicesText, "未填");

    const pickup =
      p.pickup_mode === "notify"
        ? "另行通知美容完成接回時間"
        : safe(p.pickup_time, "未填");

    const payment =
      p.payment === "其他"
        ? `其他（${safe(p.payment_other, "未填")}）`
        : safe(p.payment, "未填");

const rows = [
  ["寵物名字", safe(p.pet_name)],
  ["寵物種類", safe(p.pet_type)],
  ["品種", safe(p.pet_breed)],
  ["毛長", safe(p.pet_hair_length || p.pet_color)],
  ["年齡（歲）", safe(p.pet_age)],
  ["晶片", e(mapChip(p.pet_chip_status, p.pet_chip_no))],
  ["性別", safe(p.pet_sex)],
  ["結紮", safe(p.pet_neuter)],
  ["親人", safe(p.pet_friendly_human)],
  ["親狗", safe(p.pet_friendly_dog)],
  ["具攻擊性", safe(p.pet_aggressive)],
  ["過往病史", safe(p.pet_medical_history)],
  ["病史描述", safe(p.pet_medical_note, "無/未填")],

  ["本次服務項目", e(serviceFinal)],
  ["預計接回時間", e(pickup)],
  ["支付方式", e(payment)],
  ["支付金額（NT$）", `NT$ ${safe(p.service_amount, "0")}`]
];
    return `
      <div style="border:1px solid #EFE7D6;border-radius:12px;padding:14px;margin:14px 0;background:#FFFEFB;">
        <div style="font-size:16px;font-weight:900;color:#5D4D41;margin-bottom:10px;">
          毛孩 ${i + 1}：${safe(p.pet_name, "未填")}
        </div>
        ${renderKVTable(rows.map(([k, v]) => [k, v]))}
      </div>
    `;
  };

  const signatureImg = safeUrl(payload.signature || payload.signature_url || "");
const signedAt = fmtIso(payload.signature_signed_at) || safe(payload.sign_time, "--");
  const agreementId = safe(payload.agreement_id || "", "");

  const ownerRows = [
    ["姓名", safe(owner.owner_name)],
    ["手機", safe(owner.owner_phone)],
    ["電子信箱", safe(owner.owner_email, "未提供")],
    ["身分證字號", safe(owner.owner_id)],
    ["通訊地址", safe(owner.owner_address)],
    ["緊急聯絡人", safe(owner.emergency_name)],
    ["緊急聯絡人電話", safe(owner.emergency_phone)],
    ["指定就醫醫院", safe(owner.preferred_hospital, "無（依店家指定）")]
  ];

  const partyBRows = [
    ["乙方店家", e(PARTY_B.name)],
    ["負責人", e(PARTY_B.principal)],
    ["聯絡電話", e(PARTY_B.phone)],
    ["地址", e(PARTY_B.address)],
    ["營業時間", e(PARTY_B.hours)],
    ["特約緊急送醫", e(PARTY_B.emergencyClinicName)],
    ["特約緊急送醫地址", e(PARTY_B.emergencyClinicAddress)]
  ];
    const termsHtml = `
    <ol style="margin:8px 0 0 18px;padding:0;line-height:1.8;color:#5D4D41;font-size:13px;">
      ${HAMI_TERMS.map((t) => `<li style="margin:0 0 8px 0;">${e(t)}</li>`).join("")}
    </ol>
    <div style="margin-top:10px;padding:10px;border:1px solid #EFE7D6;border-radius:10px;background:#FFFBF2;font-size:12px;color:#8D7E73;line-height:1.7;">
      ※ 飼主點擊「我已詳閱並同意」並完成簽名，即視為已詳閱並同意上述條款。
    </div>
  `;

  return `
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hami 寵物美容｜契約副本</title>
</head>

<body style="margin:0;padding:20px;background:#FFFDF8;color:#5D4D41;font-family:Arial,'Noto Sans TC',sans-serif;">
  <div style="max-width:860px;margin:0 auto;background:#ffffff;border:1px solid #EFE7D6;border-radius:14px;overflow:hidden;">
    <div style="background:#5D4D41;color:#fff;padding:16px 18px;display:flex;align-items:center;gap:12px;">
      <img src="${e(LOGO_URL)}" alt="Hami logo" style="width:44px;height:44px;border-radius:12px;background:#fff;object-fit:contain;" />
      <div style="min-width:0;">
        <div style="font-size:18px;font-weight:900;line-height:1.2;">Hami 寵物美容｜寵物美容定型化契約（副本）</div>
        <div style="font-size:12px;color:#F6EBC6;font-weight:800;margin-top:4px;">
          ${agreementId ? `Agreement ID：${agreementId}` : "（系統輸出副本）"}
        </div>
      </div>
    </div>

    <div style="padding:18px;">
      <h2 style="margin:0 0 10px 0;font-size:16px;">甲方（消費者）資料</h2>
      ${renderKVTable(ownerRows.map(([k, v]) => [k, v]))}

      <h2 style="margin:18px 0 10px 0;font-size:16px;">乙方資訊</h2>
      ${renderKVTable(partyBRows.map(([k, v]) => [k, v]))}

      <h2 style="margin:18px 0 10px 0;font-size:16px;">毛孩與本次服務內容</h2>
      ${pets.length ? pets.map((pet, i) => renderPet(pet, i)).join("") : `<div style="color:#8D7E73;font-weight:800;">（無毛孩資料）</div>`}

      <h2 style="margin:18px 0 10px 0;font-size:16px;">契約條款全文</h2>
      ${termsHtml}
      ${totalHtml}
      <h2 style="margin:18px 0 10px 0;font-size:16px;">簽名與簽署時間</h2>
      <div style="border:1px dashed #DCCFB5;padding:12px;border-radius:12px;background:#FFFEFB;">
        <div style="font-size:12px;color:#8D7E73;font-weight:800;margin-bottom:8px;">飼主電子簽名檔</div>
        ${
          signatureImg
            ? `<img src="${signatureImg}" alt="signature" style="max-height:120px;max-width:100%;object-fit:contain;background:#FFF9F2;border-radius:10px;padding:8px;border:1px solid #EFE7D6;" />`
            : `<div style="color:#D9534F;font-weight:900;">（無簽名檔）</div>`
        }
<div style="margin-top:10px;font-size:12px;color:#8D7E73;line-height:1.8;font-weight:800;">
  簽署時間：${e(signedAt)}
</div>
      </div>

      <div style="margin-top:16px;font-size:12px;color:#8D7E73;line-height:1.7;">
        本副本為系統輸出，建議飼主截圖或列印留存。若有疑義，以門市現場說明及最終確認內容為準。
      </div>
    </div>
  </div>
</body>
</html>
  `;
}

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
